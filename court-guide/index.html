<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App identity -->
    <title>Interactive Court Guide</title>
    <meta name="description" content="Step-by-step guidance for court services — documents, locations, and more." />

    <!-- Mobile: full-screen feel, blue chrome bar -->
    <meta name="theme-color" content="#1d4ed8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Court Guide" />

    <!-- Google Font: Inter (clean, readable on mobile) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Vite injects main.jsx here at build time -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
